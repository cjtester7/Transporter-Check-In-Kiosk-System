# ============================================================
# DEPLOYMENT NOTES
# ============================================================

[deployment]
hosting           = "Netlify"
repo              = "GitHub"
appscript_note    = "Always use Deploy > New Deployment — never Manage Deployments"
url_note          = "Update DEFAULT_APPS_SCRIPT_URL in index.html and APPS_SCRIPT_URL in checkin.html after each new deployment"
init_note         = "After new appscript version: run getSheet, getUsersSheet, getAuditSheet, getNotesSheet, getPhotosSheet in editor to initialise tabs"
cache_note        = "Run localStorage.removeItem('carsrus_script_url') in browser console if old URL is cached"

# ============================================================
# PLANNED — FUTURE MIGRATION
# ============================================================

[future]
backend     = "Supabase (PostgreSQL)"
reason      = "Google Apps Script cold starts, execution limits, no concurrent write safety"
frontend    = "index.html and checkin.html UI unchanged — only callScript() replaced"
auth        = "Supabase Auth replaces hardcoded users and Google Sheets Users tab"
realtime    = "Supabase real-time subscriptions replace 5-minute auto-refresh polling"
